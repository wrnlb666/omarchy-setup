workspace = special:scratchpad, layout:scrolling

# windowrule = match:class ^(.*)$, center on
windowrule = tag -floating-window, match:class ^(Bitwarden)$

windowrule = match:initial_class ^(QQ)$, float true
windowrule = match:initial_title ^(Weixin)$, float true
windowrule = match:initial_class ^(Bitwarden)$, float true
windowrule = match:initial_class ^(localsend)$, float true
windowrule = match:initial_class ^(AmneziaVPN)$, float true
windowrule = match:initial_class ^(org.gnome.Boxes)$, float true
windowrule = match:initial_class ^(Mattermost.Desktop)$, float true
windowrule = match:initial_class ^(org.manjaro.pamac.manager)$, float true

windowrule = match:initial_title ^(QQ)$, size 1200 800
windowrule = match:initial_title ^(Weixin)$, size 1200 800
windowrule = match:initial_class ^(Bitwarden)$, size 1200 800
windowrule = match:initial_class ^(localsend)$, size 800 600
windowrule = match:initial_class ^(AmneziaVPN)$, size 400 800
windowrule = match:initial_class ^(org.gnome.Boxes)$, size 1200 800
windowrule = match:initial_class ^(Mattermost.Desktop)$, size 1200 800
windowrule = match:initial_class ^(org.manjaro.pamac.manager)$, size 1200 800

windowrule = match:initial_title ^(QQ)$, center on
windowrule = match:initial_title ^(Weixin)$, center on
windowrule = match:initial_class ^(Bitwarden)$, center on
windowrule = match:initial_class ^(localsend)$, center on
windowrule = match:initial_class ^(AmneziaVPN)$, center on
windowrule = match:initial_class ^(org.gnome.Boxes)$, center on
windowrule = match:initial_class ^(Mattermost.Desktop)$, center on
windowrule = match:initial_class ^(org.manjaro.pamac.manager)$, center on
